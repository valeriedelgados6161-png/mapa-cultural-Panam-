<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Lato', sans-serif; background-color: #f4f6f7; }
        #contenedor-principal { display: flex; flex-direction: column; height: 100vh; }
        #leyenda { width: 100%; background: #ffffff; padding: 20px; overflow-y: auto; height: 40vh; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #mapa { flex-grow: 1; width: 100%; height: 60vh; }
        @media screen and (min-width: 768px) {
            #contenedor-principal { flex-direction: row; }
            #leyenda { width: 350px; height: 100vh; }
            #mapa { height: 100vh; }
        }
        details { background: #fff; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; }
        summary { padding: 12px; cursor: pointer; font-weight: 700; color: white; border-radius: 8px; }
        .bloque-raices summary { background-color: #2c3e50; }
        .bloque-manos summary { background-color: #27ae60; }
        .bloque-sabores summary { background-color: #e67e22; }
        .bloque-fiestas summary { background-color: #880e4f; }
        .bloque-encuentro summary { background-color: #2980b9; }
        .bloque-secretos summary { background-color: #f39c12; }
        .contenido-bloque { padding: 10px; }
        .item-leyenda { display: block; padding: 5px; cursor: pointer; font-size: 14px; }
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-contenido { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="leyenda">
        <h1 style="font-family: 'Playfair Display'; color: #2c3e50;">Mapa Cultural</h1>
        
        <details class="bloque-raices"><summary>Patrimonio Histórico</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked onchange="filtrar()"> Iglesias y Capillas</label>
        </div></details>
        <details class="bloque-manos"><summary>Manos que Crean</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="talleres" checked onchange="filtrar()"> Talleres de Artesanos</label>
        </div></details>
        <details class="bloque-sabores"><summary>Sabores de Nuestra Tierra</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fondas" checked onchange="filtrar()"> Fondas y Cocinas</label>
        </div></details>
        <details class="bloque-fiestas"><summary>Expresiones y Leyendas</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fiestas" checked onchange="filtrar()"> Festividades Populares</label>
        </div></details>
        <details class="bloque-encuentro"><summary>Espacios de Encuentro</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="parques" checked onchange="filtrar()"> Parques</label>
        </div></details>
        
        <!-- Aquí está la categoría correcta -->
        <details class="bloque-secretos"><summary>Secretos de nuestra Tierra</summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="secretos" checked onchange="filtrar()"> Datos Curiosos</label>
        </div></details>
    </div>
    <div id="mapa"></div>
</div>

<div id="modal-detalle"><div class="modal-contenido" id="modal-interno"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapa').setView([8.5380, -80.7821], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
    
    const grupos = {
        iglesias: L.layerGroup().addTo(map),
        talleres: L.layerGroup().addTo(map),
        fondas: L.layerGroup().addTo(map),
        fiestas: L.layerGroup().addTo(map),
        parques: L.layerGroup().addTo(map),
        secretos: L.layerGroup().addTo(map)
    };

    function agregarPunto(lat, lng, color, titulo, img, texto, cat) {
        const icono = L.divIcon({ html: `<div style="background:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>` });
        L.marker([lat, lng], {icon: icono}).addTo(grupos[cat]).on('click', () => {
            document.getElementById('modal-interno').innerHTML = `<img src="${img}" style="width:100%; border-radius:10px;"><h2>${titulo}</h2><p style="text-align:justify;">${texto}</p><button onclick="document.getElementById('modal-detalle').style.display='none'" style="width:100%; padding:10px; cursor:pointer;">Cerrar</button>`;
            document.getElementById('modal-detalle').style.display = 'flex';
        });
    }

    agregarPunto(7.8357, -80.3964, '#880e4f', 'Semana del Campesino en Agua Buena', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica. Un momento muy especial es la presentación de la nueva reina, quien toma el lugar de la reina saliente para representar a nuestra comunidad durante todo el año. Es característico ver las carretas decoradas con elementos de nuestra identidad, como totumas, instrumentos musicales, bateas y churucas, mientras las empolleradas y la reina bailan al ritmo del tamborito. Además, compartimos una rica gastronomía con delicias como cocadas, cocaditas, rosquetes, yuca, chicharrones y chicha de junta. Esta fiesta es el espacio donde todo el pueblo se reúne para celebrar el legado que nos llena de orgullo y mantiene vivas nuestras costumbres.', 'fiestas');
    
    // Punto del Sombrero Pintao en la categoría 'secretos'
    agregarPunto(7.9, -80.4, '#f39c12', 'El Sombrero Pintao', 'https://i.postimg.cc/vHDffyq2/sombrero-pintao.jpg', '¿Sabías que un sombrero pintado de alta calidad puede tomar entre 3 y 6 meses de trabajo manual? Esta artesanía tradicional panameña se elabora con fibras naturales de bellota, que son cuidadosamente seleccionadas, secadas, teñidas y tejidas a mano. Los diseños oscuros característicos se obtienen mediante tintes naturales extraídos de plantas y cortezas. Mientras más fino y apretado sea el tejido, mayor será el tiempo de elaboración y el valor de la pieza. Cada sombrero representa cientos de horas de trabajo y conocimientos transmitidos de generación en generación por los artesanos panameños. <br><br><b>Fuente:</b> Ministerio de Cultura de Panamá y UNESCO.', 'secretos');

    function filtrar() {
        document.querySelectorAll('.filtro').forEach(c => {
            if (c.checked) map.addLayer(grupos[c.dataset.cat]);
            else map.removeLayer(grupos[c.dataset.cat]);
        });
    }
</script>
</body>
</html>
