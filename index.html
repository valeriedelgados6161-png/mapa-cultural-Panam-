<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Lato', sans-serif; overflow: hidden; }
        
        #contenedor-principal { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* Panel superior de categorías */
        #leyenda { width: 100%; background: #ffffff; padding: 15px; box-sizing: border-box; overflow-y: auto; flex-shrink: 0; max-height: 50vh; }
        
        /* Mapa ocupa el resto del espacio */
        #mapa { flex-grow: 1; width: 100%; }

        /* Categorías - Ajuste para que no sean diminutas */
        details { background: #fff; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ccc; }
        summary { padding: 15px 20px; cursor: pointer; list-style: none; font-weight: 700; color: white; display: flex; align-items: center; justify-content: space-between; font-size: 16px; border-radius: 10px; }
        
        .bloque-raices summary { background-color: #1a5276; }
        .bloque-manos summary { background-color: #1e8449; }
        .bloque-sabores summary { background-color: #d35400; }
        .bloque-fiestas summary { background-color: #c70039; }

        .contenido-bloque { padding: 10px 20px; }
        .item-leyenda { display: flex; align-items: center; padding: 8px 0; font-size: 15px; }

        /* Formulario */
        #form-container { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:9999; width: 90%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="contenedor-principal">
        <div id="leyenda">
            <h2 style="margin:0 0 5px 0;">Mapa Cultural</h2>
            <div style="font-size: 14px; margin-bottom: 15px;">Nuestras raíces a un toque.</div>
            
            <details class="bloque-raices"><summary><i class="fas fa-landmark"></i> Historia y Raíces <span>▼</span></summary><div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked> Iglesias</label>
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="templos" checked> Templos</label>
            </div></details>
            <details class="bloque-manos"><summary><i class="fas fa-palette"></i> Manos Creadoras <span>▼</span></summary><div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="talleres" checked> Talleres artesanales</label>
            </div></details>
            <!-- Agrega aquí tus otras categorías siguiendo este mismo formato -->
        </div>

        <div id="mapa"></div>
    </div>

    <form id="form-container" action="https://formsubmit.co/valerie.delgado@utp.ac.pa" method="POST">
        <h3>Registrar punto</h3>
        <input type="text" name="Nombre" placeholder="Nombre" required>
        <select name="Categoria">
            <option value="iglesias">Iglesias</option>
            <option value="templos">Templos</option>
            <option value="sitios">Sitios arqueológicos</option>
            <option value="museos">Museos</option>
        </select>
        <button type="submit" style="width:100%; padding:10px;">Enviar</button>
        <button type="button" onclick="document.getElementById('form-container').style.display='none'" style="width:100%; padding:10px; margin-top:5px;">Cancelar</button>
    </form>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('mapa').setView([8.5380, -80.7821], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        map.on('click', () => { document.getElementById('form-container').style.display = 'block'; });
    </script>
</body>
</html>
