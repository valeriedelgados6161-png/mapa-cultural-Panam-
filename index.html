<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Lato', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #leyenda { width: 320px; height: 100vh; padding: 15px; background: #fff; overflow-y: auto; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #mapa { flex-grow: 1; height: 100%; z-index: 1; }
        
        /* Categorías */
        details { background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        summary { padding: 12px; cursor: pointer; font-weight: 700; color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .bloque-raices summary { background-color: #1a5276; }
        .bloque-manos summary { background-color: #1e8449; }
        .bloque-sabores summary { background-color: #d35400; }
        .bloque-fiestas summary { background-color: #c70039; }
        .item-leyenda { display: flex; align-items: center; padding: 6px; font-size: 13px; cursor: pointer; }
        .circulo { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }

        /* Modal y Formulario */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-contenido { background: white; width: 90%; max-width: 450px; padding: 20px; border-radius: 12px; max-height: 90vh; overflow-y: auto; position: relative; }
        #form-container { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: white; padding: 20px; border-radius: 10px; z-index: 9999; width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #leyenda { width: 100%; height: 40vh; }
            #mapa { height: 60vh; }
        }
    </style>
</head>
<body>

    <div id="leyenda">
        <h2>Mapa Cultural</h2>
        <div class="caja-tip">💡 Presiona el mapa para registrar un lugar.</div>
        <hr>
        <details class="bloque-raices" open><summary>Historia y Raíces <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Iglesias</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="museos" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Museos</label>
        </div></details>
        <details class="bloque-manos"><summary>Manos Creadoras <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="talleres" checked onchange="filtrar()"> <div class="circulo" style="background:#1e8449"></div> Talleres</label>
        </div></details>
        <details class="bloque-fiestas"><summary>Fiestas <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fiestas" checked onchange="filtrar()"> <div class="circulo" style="background:#c70039"></div> Fiestas</label>
        </div></details>
    </div>

    <div id="mapa"></div>

    <div id="modal-detalle"><div class="modal-contenido" id="modal-contenido-interno"></div></div>

    <form id="form-container" action="https://formsubmit.co/valery.delgado@tp.ac.pa" method="POST">
        <h3>Registrar nuevo lugar</h3>
        <input type="text" name="Nombre" placeholder="Nombre" style="width:100%; padding:8px; margin-bottom:10px;" required>
        <select name="Categoria" style="width:100%; padding:8px; margin-bottom:10px;">
            <option value="iglesias">Iglesias</option><option value="talleres">Talleres</option><option value="fiestas">Fiestas</option>
        </select>
        <button type="submit" style="width:100%; padding:10px; background:#1a5276; color:white; border:none;">Enviar</button>
        <button type="button" onclick="document.getElementById('form-container').style.display='none'" style="width:100%; margin-top:5px; padding:10px;">Cancelar</button>
    </form>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('mapa').setView([8.5380, -80.7821], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const grupos = { iglesias: L.layerGroup().addTo(map), talleres: L.layerGroup().addTo(map), fiestas: L.layerGroup().addTo(map), museos: L.layerGroup().addTo(map) };

        map.on('click', () => document.getElementById('form-container').style.display = 'block');

        function agregarPunto(lat, lng, color, titulo, img, texto, cat) {
            const icon = L.divIcon({ html: `<div style="background-color:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>` });
            L.marker([lat, lng], {icon}).addTo(grupos[cat]).on('click', () => {
                document.getElementById('modal-contenido-interno').innerHTML = `<img src="${img}" style="width:100%; border-radius:10px;"><h2>${titulo}</h2><p>${texto}</p><button class="btn-cerrar" onclick="document.getElementById('modal-detalle').style.display='none'" style="width:100%; padding:10px; background:#c70039; color:white; border:none; cursor:pointer;">Cerrar</button>`;
                document.getElementById('modal-detalle').style.display = 'flex';
            });
        }

        agregarPunto(7.8357, -80.3964, '#c70039', 'Semana del Campesino en Agua Buena.', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica...', 'fiestas');

        function filtrar() {
            document.querySelectorAll('.filtro').forEach(c => {
                const g = grupos[c.dataset.cat];
                if (g) { c.checked ? map.addLayer(g) : map.removeLayer(g); }
            });
        }
    </script>
</body>
</html>
