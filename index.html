<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herencia Viva - Mapa Cultural</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        h1 { color: #1d3557; margin: 10px 0 0; }
        .eslogan { color: #666; font-size: 14px; margin-bottom: 10px; }
        .tip { background: #fff3cd; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border-left: 4px solid #ffeeba; }
        
        details { background: white; margin-bottom: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        summary { padding: 15px; font-weight: bold; color: white; border-radius: 12px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; }
        .subcat-list { padding: 10px; background: #fff; border-radius: 0 0 12px 12px; }
        
        #mapa { height: 400px; border: 5px solid white; border-radius: 18px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; padding: 20px; z-index: 2000; }
        .box { background: white; padding: 20px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Herencia Viva</h1>
    <div class="eslogan">Nuestras raíces a un toque de distancia.</div>
    <div class="tip">💡Tip: Haz click en cualquier punto del mapa para sugeir una nueva ubicación.</div>

    <!-- Categorías -->
    <details><summary style="background:#1F567D;">Patrimonio Histórico <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Iglesias" checked> Iglesias</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Sitios históricos" checked> Sitios históricos</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Monumentos" checked> Monumentos</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Museos" checked> Museos</label>
        </div>
    </details>

    <details><summary style="background:#23904C;">Manos que Crean <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Talleres de artesanía" checked> Talleres de artesanía</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Confección de trajes típicos" checked> Confección de trajes típicos</label>
        </div>
    </details>

    <details><summary style="background:#D86200;">Sabores de Nuestra Tierra <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Fondas" checked> Fondas</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Panaderías tradicionales" checked> Panaderías tradicionales</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Postres típicos" checked> Postres típicos</label>
        </div>
    </details>

    <details><summary style="background:#C2185B;">Expresiones y Leyendas <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Festividades" checked> Festividades</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Mitos y leyendas" checked> Mitos y leyendas</label>
        </div>
    </details>

    <details><summary style="background:#2980B9;">Espacios de Encuentro <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Plazas" checked> Plazas</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Parques" checked> Parques</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Centros comunitarios" checked> Centros comunitarios</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Bibliotecas" checked> Bibliotecas</label>
        </div>
    </details>

    <details><summary style="background:#D4A017;">Secretos de la Tierra <span>▼</span></summary>
        <div class="subcat-list">
            <label><input type="checkbox" class="filtro" data-cat="Curiosidades" checked> Curiosidades</label><br>
            <label><input type="checkbox" class="filtro" data-cat="Lugares escondidos" checked> Lugares escondidos</label>
        </div>
    </details>

    <div id="mapa"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapa').setView([7.8, -80.4], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

   
// Definición de puntos con descripciones y fotos
    const puntos = [
        {
            lat: 7.8357, 
            lng: -80.3964, 
            cat: 'Festividades', 
            nombre: 'Semana del Campesino en Agua Buena', 
            color: '#C2185B',
            img: 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg',
            desc: 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica. Un momento muy especial es la presentación de la nueva reina, quien toma el lugar de la reina saliente para representar a nuestra comunidad durante todo el año. Es característico ver las carretas decoradas con elementos de nuestra identidad, como totumas, instrumentos musicales, bateas y churucas, mientras las empolleradas y la reina bailan al ritmo del tamborito. Además, compartimos una rica gastronomía con delicias como cocadas, cocaditas, rosquetes, yuca, chicharrones y chicha de junta. Esta fiesta es el espacio donde todo el pueblo se reúne para celebrar el legado que nos llena de orgullo y mantiene vivas nuestras costumbres.'
        },
        {
            lat: 7.9, 
            lng: -80.4, 
            cat: 'Talleres de artesanía', 
            nombre: 'El Sombrero Pintao', 
            color: '#23904C',
            img: 'https://i.postimg.cc/vHDffyq2/sombrero-pintao.jpg',
            desc: '¿Sabías que un sombrero pintado de alta calidad puede tomar entre 3 y 6 meses de trabajo manual? Esta artesanía tradicional panameña se elabora con fibras naturales de bellota, que son cuidadosamente seleccionadas, secadas, teñidas y tejidas a mano. Los diseños oscuros característicos se obtienen mediante tintes naturales extraídos de plantas y cortezas. Mientras más fino y apretado sea el tejido, mayor será el tiempo de elaboración y el valor de la pieza. Cada sombrero representa cientos de horas de trabajo y conocimientos transmitidos de generación en generación por los artesanos panameños. Esta pieza no solo es un accesorio, es un símbolo de identidad nacional que ha sido reconocido por su valor histórico y cultural.<br><br><b>Fuente:</b> UNESCO, Patrimonio Cultural Inmaterial.'
        },
        {
            lat: 7.9715, 
            lng: -80.4290, 
            cat: 'Parques', 
            nombre: 'Parque Belisario Porras', 
            color: '#2980B9',
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Las_Tableras_Panama.jpg/640px-Las_Tableras_Panama.jpg',
            desc: 'Espacio emblemático utilizado para actividades culturales y comunitarias en el corazón de nuestra región.'
        }
    ];
    

    let marcadores = [];

    function actualizarMapa() {
        // Limpiar mapa
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];

        // Filtrar y mostrar
        puntos.forEach(p => {
            const checkbox = document.querySelector(`[data-cat="${p.cat}"]`);
            if (checkbox && checkbox.checked) {
                const m = L.circleMarker([p.lat, p.lng], {color: p.color, radius: 8}).addTo(map)
                           .bindPopup(p.nombre);
                marcadores.push(m);
            }
        });
    }

    document.querySelectorAll('.filtro').forEach(cb => cb.addEventListener('change', actualizarMapa));
    actualizarMapa();
</script>
</body>
</html>
