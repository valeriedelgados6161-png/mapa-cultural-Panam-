<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Lato', sans-serif; overflow: hidden; }
        #contenedor-principal { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #leyenda { width: 100%; background: #ffffff; padding: 15px; box-sizing: border-box; overflow-y: auto; flex-shrink: 0; max-height: 50vh; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        #mapa { flex-grow: 1; width: 100%; z-index: 1; }

        details { background: #fff; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; }
        summary { padding: 15px 20px; cursor: pointer; list-style: none; font-weight: 700; color: white; display: flex; align-items: center; justify-content: space-between; font-size: 16px; border-radius: 8px; }
        
        .bloque-raices summary { background-color: #1a5276; }
        .bloque-manos summary { background-color: #1e8449; }
        .bloque-sabores summary { background-color: #d35400; }
        .bloque-fiestas summary { background-color: #c70039; }

        .contenido-bloque { padding: 10px 20px; }
        
        /* CORRECCIÓN: Estructura fija para que el texto NO se mueva */
        .item-leyenda { 
            display: grid; 
            grid-template-columns: 30px 20px 1fr; 
            align-items: center; 
            padding: 8px 0; 
            font-size: 15px; 
            color: #333; 
            cursor: pointer;
        }
        .circulo { width: 12px; height: 12px; border-radius: 50%; }

        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-contenido { background: white; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 25px; border-radius: 15px; position: relative; }
        
        #form-container { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:9999; width: 85%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="leyenda">
        <h2 style="margin:0 0 10px 0; font-family: 'Playfair Display';">Mapa Cultural de Panamá</h2>
        
        <details class="bloque-raices"><summary><i class="fas fa-landmark"></i> Historia y Raíces <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> <span>Iglesias</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="templos" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> <span>Templos</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="sitios" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> <span>Sitios arqueológicos</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="museos" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> <span>Museos</span></label>
        </div></details>

        <details class="bloque-manos"><summary><i class="fas fa-palette"></i> Manos Creadoras <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="talleres" checked onchange="filtrar()"> <div class="circulo" style="background:#1e8449"></div> <span>Talleres artesanales</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="trajes" checked onchange="filtrar()"> <div class="circulo" style="background:#1e8449"></div> <span>Confección de trajes típicos</span></label>
        </div></details>

        <details class="bloque-sabores"><summary><i class="fas fa-utensils"></i> Sabores <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="panaderias" checked onchange="filtrar()"> <div class="circulo" style="background:#d35400"></div> <span>Panaderías</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fondas" checked onchange="filtrar()"> <div class="circulo" style="background:#d35400"></div> <span>Fondas</span></label>
        </div></details>

        <details class="bloque-fiestas"><summary><i class="fas fa-music"></i> Fiestas <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fiestas" checked onchange="filtrar()"> <div class="circulo" style="background:#c70039"></div> <span>Fiestas</span></label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="mitos" checked onchange="filtrar()"> <div class="circulo" style="background:#c70039"></div> <span>Mitos</span></label>
        </div></details>
    </div>

    <div id="mapa"></div>
</div>

<div id="modal-detalle"><div class="modal-contenido" id="modal-contenido-interno"></div></div>

<form id="form-container" action="https://formsubmit.co/1089a8264906f363c401344421b47167" method="POST" enctype="multipart/form-data">
    <h3 style="margin-top:0;">Registrar nuevo lugar</h3>
    
    <input type="text" name="Titulo" placeholder="Título del lugar" required>
    <input type="text" name="Ubicacion" placeholder="Coordenadas (Lat, Long)" required>
    <select name="Categoria">
        <option value="iglesias">Iglesias</option><option value="templos">Templos</option>
        <option value="sitios">Sitios arqueológicos</option><option value="museos">Museos</option>
        <option value="talleres">Talleres artesanales</option><option value="trajes">Confección de trajes típicos</option>
        <option value="panaderias">Panaderías</option><option value="fondas">Fondas</option>
        <option value="fiestas">Fiestas</option><option value="mitos">Mitos</option>
    </select>
    <textarea name="Descripcion" placeholder="Escribe la descripción aquí..." rows="4" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;" required></textarea>
    
    <label style="font-size:12px;">Sube una foto del lugar:</label>
    <input type="file" name="attachment" accept="image/*" required>

    <button type="submit" style="background:#1a5276; color:white; border:none; width:100%; padding:12px; cursor:pointer; font-weight:bold;">Enviar registro</button>
    <button type="button" onclick="document.getElementById('form-container').style.display='none'" style="width:100%; padding:10px; margin-top:5px; cursor:pointer;">Cancelar</button>
</form>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapa').setView([8.5380, -80.7821], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    const grupos = {};
    document.querySelectorAll('.filtro').forEach(el => { grupos[el.dataset.cat] = L.layerGroup().addTo(map); });

    function agregarPunto(lat, lng, color, titulo, img, texto, cat) {
        const icono = L.divIcon({ html: `<div style="background:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>` });
        L.marker([lat, lng], {icon: icono}).addTo(grupos[cat]).on('click', () => {
            document.getElementById('modal-contenido-interno').innerHTML = `
                <img src="${img}" style="width:100%; border-radius:10px;">
                <h2 style="color:#1a5276;">${titulo}</h2>
                <p style="text-align:justify;">${texto}</p>
                <button onclick="document.getElementById('modal-detalle').style.display='none'" style="width:100%; padding:10px; cursor:pointer;">Cerrar</button>`;
            document.getElementById('modal-detalle').style.display = 'flex';
        });
    }

    agregarPunto(7.8357, -80.3964, '#c70039', 'Semana del Campesino en Agua Buena.', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica. Un momento muy especial es la presentación de la nueva reina, quien toma el lugar de la reina saliente para representar a nuestra comunidad durante todo el año. Es característico ver las carretas decoradas con elementos de nuestra identidad, como totumas, instrumentos musicales, bateas y churucas, mientras las empolleradas y la reina bailan al ritmo del tamborito. Además, compartimos una rica gastronomía con delicias como cocadas, cocaditas, rosquetes, yuca, chicharrones y chicha de junta. Esta fiesta es el espacio donde todo el pueblo se reúne para celebrar el legado que nos llena de orgullo y mantiene vivas nuestras costumbres.', 'fiestas');
   
    agregarPunto(9.244730166964654, -79.67262371259666, '#1a5276', 'Parroquia San Juan Bautista.', 'https://i.postimg.cc/x8x9sMsS/f0f88afb-831e-40f1-9d11-3ed673d6dfbb.png', 'DESCRIPCIÓN', 'Iglesias');

    map.on('click', () => { document.getElementById('form-container').style.display = 'block'; });

    function filtrar() {
        document.querySelectorAll('.filtro').forEach(c => {
            const g = grupos[c.dataset.cat];
            if (c.checked) map.addLayer(g); else map.removeLayer(g);
        });
    }
</script>
</body>
</html>
