<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #contenedor { display: flex; flex-direction: column; height: 100vh; }
        #leyenda { width: 100%; background: #fff; padding: 15px; box-sizing: border-box; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #mapa { flex-grow: 1; width: 100%; }
        
        @media (min-width: 768px) {
            #contenedor { flex-direction: row; }
            #leyenda { width: 320px; height: 100vh; }
        }

        details { border: 1px solid #ddd; border-radius: 5px; margin-bottom: 5px; background: #f9f9f9; }
        summary { padding: 10px; cursor: pointer; font-weight: bold; }
        .contenido-bloque { padding: 10px; }
        .item-leyenda { display: block; margin-bottom: 5px; cursor: pointer; }
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-contenido { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="contenedor">
    <div id="leyenda">
        <h1>Mapa Cultural</h1>
        
        <details><summary>Patrimonio Histórico</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked onchange="filtrar()"> Iglesias y Capillas</label>
            </div>
        </details>
        <details><summary>Manos que Crean</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="artesanos" checked onchange="filtrar()"> Talleres de Artesanos</label>
            </div>
        </details>
        <details><summary>Sabores de Nuestra Tierra</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fondas" checked onchange="filtrar()"> Fondas y Cocinas</label>
            </div>
        </details>
        <details><summary>Expresiones y Leyendas</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fiestas" checked onchange="filtrar()"> Festividades Populares</label>
            </div>
        </details>
        <details><summary>Espacios de Encuentro</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="parques" checked onchange="filtrar()"> Parques</label>
            </div>
        </details>
        <details><summary>Secretos de nuestra Tierra</summary>
            <div class="contenido-bloque">
                <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="secretos" checked onchange="filtrar()"> Datos Curiosos</label>
            </div>
        </details>
    </div>
    <div id="mapa"></div>
</div>

<div id="modal-detalle"><div class="modal-contenido" id="modal-interno"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapa').setView([8.5, -80.8], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const grupos = {
        iglesias: L.layerGroup().addTo(map),
        artesanos: L.layerGroup().addTo(map),
        fondas: L.layerGroup().addTo(map),
        fiestas: L.layerGroup().addTo(map),
        parques: L.layerGroup().addTo(map),
        secretos: L.layerGroup().addTo(map)
    };

    function agregarPunto(lat, lng, titulo, img, texto, cat) {
        L.marker([lat, lng]).addTo(grupos[cat]).on('click', () => {
            document.getElementById('modal-interno').innerHTML = `
                <img src="${img}" style="width:100%; border-radius:10px;">
                <h2>${titulo}</h2>
                <p>${texto}</p>
                <button onclick="document.getElementById('modal-detalle').style.display='none'">Cerrar</button>
            `;
            document.getElementById('modal-detalle').style.display = 'flex';
        });
    }

    // Ejemplo Agua Buena
    agregarPunto(7.8357, -80.3964, 'Semana del Campesino en Agua Buena', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones...', 'fiestas');
    
    // Ejemplo Sombrero
    agregarPunto(7.9, -80.4, 'El Sombrero Pintao', 'https://i.postimg.cc/vHDffyq2/sombrero-pintao.jpg', '¿Sabías que un sombrero pintado de alta calidad puede tomar entre 3 y 6 meses de trabajo manual? ...', 'secretos');

    function filtrar() {
        document.querySelectorAll('.filtro').forEach(c => {
            if (c.checked) map.addLayer(grupos[c.dataset.cat]);
            else map.removeLayer(grupos[c.dataset.cat]);
        });
    }
</script>
</body>
</html>
