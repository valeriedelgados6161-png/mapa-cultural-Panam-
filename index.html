<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Herencia Viva - Mapa Cultural</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Lato', sans-serif; }
        #contenedor { display: flex; flex-direction: column; height: 100vh; }
        #sidebar { width: 100%; height: 50vh; padding: 20px; box-sizing: border-box; overflow-y: auto; background: #fff; }
        .tip-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: #856404; font-size: 14px; }
        .cat-box { padding: 12px; margin-bottom: 5px; border-radius: 6px; color: white; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .subcat { font-size: 12px; padding: 10px; background: #f9f9f9; display: none; color: #555; }
        .form-area { margin-top: 20px; padding: 15px; border: 2px solid #2c3e50; border-radius: 12px; display: none; }
        #mapa { flex-grow: 1; margin: 10px; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 15px; max-height: 80vh; overflow-y: auto; text-align: center; }
    </style>
</head>
<body>

<div id="contenedor">
    <div id="sidebar">
        <h1>Herencia Viva</h1>
        <div class="tip-box">💡 Tip: Presiona cualquier lugar del mapa para sugerir una nueva ubicación.</div>
        
        <div onclick="this.querySelector('.subcat').style.display = (this.querySelector('.subcat').style.display === 'block' ? 'none' : 'block')">
            <div class="cat-box" style="background:#2c3e50;">Patrimonio Histórico <span>▼</span></div>
            <div class="subcat">Iglesias coloniales, Sitios históricos, Monumentos.</div>
        </div>
        <div onclick="this.querySelector('.subcat').style.display = (this.querySelector('.subcat').style.display === 'block' ? 'none' : 'block')">
            <div class="cat-box" style="background:#27ae60;">Manos que Crean <span>▼</span></div>
            <div class="subcat">Artesanías, Sombrero pintado, Orfebrería.</div>
        </div>

        <div id="form-container" class="form-area">
            <h3>Sugerir nuevo punto</h3>
            <form action="https://formspree.io/f/TU_CODIGO_AQUI" method="POST" enctype="multipart/form-data">
                <input type="text" name="nombre" placeholder="Nombre del lugar" required>
                <input type="text" id="coords" name="coordenadas" readonly placeholder="Coordenadas automáticas">
                <textarea name="desc" placeholder="Descripción detallada" rows="4" required></textarea>
                <input type="file" name="foto" accept="image/*">
                <button type="submit">Enviar sugerencia</button>
            </form>
        </div>
    </div>
    <div id="mapa"></div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
        <button onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapa').setView([7.83, -80.40], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function mostrarModal(titulo, img, texto) {
        document.getElementById('modal-body').innerHTML = `<img src="${img}" style="width:100%; border-radius:10px;"><h2 style="font-family:serif;">${titulo}</h2><p style="text-align:justify;">${texto}</p>`;
        document.getElementById('modal').style.display = 'flex';
    }

    // Puntos con sus respectivos colores
    L.circleMarker([7.8357, -80.3964], {color: '#2c3e50', radius: 8, fillOpacity: 1})
     .addTo(map).on('click', () => mostrarModal('Semana del Campesino en Agua Buena', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica. Un momento muy especial es la presentación de la nueva reina, quien toma el lugar de la reina saliente para representar a nuestra comunidad durante todo el año. Es característico ver las carretas decoradas con elementos de nuestra identidad, como totumas, instrumentos musicales, bateas y churucas, mientras las empolleradas y la reina bailan al ritmo del tamborito. Además, compartimos una rica gastronomía con delicias como cocadas, cocaditas, rosquetes, yuca, chicharrones y chicha de junta. Esta fiesta es el espacio donde todo el pueblo se reúne para celebrar el legado que nos llena de orgullo y mantiene vivas nuestras costumbres.'));

    L.circleMarker([7.9000, -80.4000], {color: '#27ae60', radius: 8, fillOpacity: 1})
     .addTo(map).on('click', () => mostrarModal('El Sombrero Pintao', 'https://i.postimg.cc/vHDffyq2/sombrero-pintao.jpg', '¿Sabías que un sombrero pintado de alta calidad puede tomar entre 3 y 6 meses de trabajo manual? Esta artesanía tradicional panameña se elabora con fibras naturales de bellota, que son cuidadosamente seleccionadas, secadas, teñidas y tejidas a mano. Los diseños oscuros característicos se obtienen mediante tintes naturales extraídos de plantas y cortezas. Mientras más fino y apretado sea el tejido, mayor será el tiempo de elaboración y el valor de la pieza. Cada sombrero representa cientos de horas de trabajo y conocimientos transmitidos de generación en generación por los artesanos panameños. Esta pieza no solo es un accesorio, es un símbolo de identidad nacional que ha sido reconocido por su valor histórico y cultural.                                                   Fuente: UNESCO, Patrimonio Cultural Inmaterial.'));

    map.on('click', (e) => {
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('coords').value = e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4);
    });
</script>
</body>
</html>
