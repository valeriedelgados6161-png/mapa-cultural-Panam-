<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Cultural de Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Lato', sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f0f2f5; overflow: hidden; }
        #leyenda { width: 360px; min-width: 360px; height: 100vh; padding: 20px; background: #ffffff; box-shadow: 2px 0 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; z-index: 1000; overflow-y: auto; }
        #leyenda h2 { color: #2c3e50; font-family: 'Playfair Display', serif; font-size: 24px; margin: 0 0 5px 0; }
        .eslogan { font-size: 16px; color: #2c3e50; opacity: 0.7; font-family: 'Playfair Display', serif; margin-bottom: 20px; }
        .caja-tip { border-left: 3px solid #ccc; padding: 5px 0 5px 10px; font-size: 12px; color: #7f8c8d; font-style: italic; line-height: 1.4; margin-bottom: 20px; }
        hr { margin: 0 0 20px 0 !important; border: 0; border-top: 1px solid #eee; }
        details { background: #fff; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; overflow: hidden; }
        summary { padding: 15px; cursor: pointer; list-style: none; font-weight: 700; color: white; display: flex; align-items: center; justify-content: space-between; }
        .bloque-raices summary { background-color: #1a5276; }
        .bloque-manos summary { background-color: #1e8449; }
        .bloque-sabores summary { background-color: #d35400; }
        .bloque-fiestas summary { background-color: #c70039; }
        .contenido-bloque { padding: 10px; }
        .item-leyenda { display: flex; align-items: center; padding: 8px; font-size: 14px; color: #333; cursor: pointer; }
        .circulo { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        #mapa { flex-grow: 1; height: 100%; width: 100%; }
        .custom-card { text-align: center; max-width: 250px; }
        .custom-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px 8px 0 0; display: block; }
        .card-body { padding: 15px; text-align: justify; }
        .card-body h3 { margin: 0 0 5px 0; color: #1a5276; font-family: 'Playfair Display', serif; }
        .card-body p { font-size: 12px; color: #4a5568; line-height: 1.5; }
        #form-container { display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%); background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.3); z-index:2000; width: 300px; }
        #form-container input, #form-container select { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }

        /* Mejora para celular: Mapa debajo de la leyenda */
        @media (max-width: 768px) {
            body { 
                flex-direction: column; 
                overflow-y: auto; 
                height: 100vh; 
            }
            #leyenda { 
                width: 100%; 
                min-width: 100%; 
                height: 200px; /* Altura fija para la leyenda en móvil */
                overflow-y: auto;
                flex: 0 0 auto;
            }
            #mapa { 
                width: 100%; 
                height: calc(100vh - 200px); /* El mapa ocupa el resto de la pantalla */
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div id="leyenda">
        <h2>Mapa Cultural de Panamá</h2>
        <div class="eslogan">Nuestras raíces a un toque de distancia.</div>
        <div class="caja-tip">💡 <b>Tip:</b> Presiona cualquier lugar del mapa para registrar un nuevo punto.</div>
        <hr>
        <details class="bloque-raices" open><summary><i class="fas fa-landmark"></i> Historia y Raíces <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="iglesias" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Iglesias</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="templos" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Templos</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="sitios" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Sitios arqueológicos</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="museos" checked onchange="filtrar()"> <div class="circulo" style="background:#1a5276"></div> Museos</label>
        </div></details>
        <details class="bloque-manos"><summary><i class="fas fa-palette"></i> Manos Creadoras <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="talleres" checked onchange="filtrar()"> <div class="circulo" style="background:#1e8449"></div> Talleres artesanales</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="trajes" checked onchange="filtrar()"> <div class="circulo" style="background:#1e8449"></div> Confección de trajes típicos</label>
        </div></details>
        <details class="bloque-sabores"><summary><i class="fas fa-utensils"></i> Sabores <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="panaderias" checked onchange="filtrar()"> <div class="circulo" style="background:#d35400"></div> Panaderías</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fondas" checked onchange="filtrar()"> <div class="circulo" style="background:#d35400"></div> Fondas</label>
        </div></details>
        <details class="bloque-fiestas"><summary><i class="fas fa-music"></i> Fiestas <span>▼</span></summary><div class="contenido-bloque">
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="fiestas" checked onchange="filtrar()"> <div class="circulo" style="background:#c70039"></div> Fiestas</label>
            <label class="item-leyenda"><input type="checkbox" class="filtro" data-cat="mitos" checked onchange="filtrar()"> <div class="circulo" style="background:#c70039"></div> Mitos</label>
        </div></details>
    </div>

    <div id="mapa"></div>

    <form id="form-container" action="https://formsubmit.co/valery.delgado@tp.ac.pa" method="POST">
        <h3>Registrar nuevo lugar</h3>
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="Nombre" id="nombre-lugar" placeholder="Nombre del lugar" required>
        <select name="Categoria" id="categoria-lugar">
            <option value="iglesias">Iglesias</option><option value="templos">Templos</option><option value="sitios">Sitios arqueológicos</option>
            <option value="museos">Museos</option><option value="fiestas">Fiestas</option><option value="talleres Artesanales">Talleres Artesanales</option>
            <option value="Confección de trajes típicos">Confección de Trajes típicos</option><option value="panaderias">Panaderías</option><option value="fondas">Fondas</option>
            <option value="mitos">Mitos</option>
        </select>
        <button type="submit" onclick="confirmarYGuardar()" style="background:#1a5276; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Enviar</button>
        <button type="button" onclick="document.getElementById('form-container').style.display='none'" style="margin-top:5px; width:100%; cursor:pointer;">Cancelar</button>
    </form>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('mapa').setView([8.5380, -80.7821], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const grupos = {
            iglesias: L.layerGroup().addTo(map), templos: L.layerGroup().addTo(map), sitios: L.layerGroup().addTo(map),
            museos: L.layerGroup().addTo(map), talleres: L.layerGroup().addTo(map), trajes: L.layerGroup().addTo(map),
            panaderias: L.layerGroup().addTo(map), fondas: L.layerGroup().addTo(map), fiestas: L.layerGroup().addTo(map), mitos: L.layerGroup().addTo(map)
        };

        let latE, lngE;
        map.on('click', (e) => {
            latE = e.latlng.lat;
            lngE = e.latlng.lng;
            document.getElementById('form-container').style.display = 'block';
        });

        function confirmarYGuardar() {
            const nombre = document.getElementById('nombre-lugar').value;
            const cat = document.getElementById('categoria-lugar').value;
            const colores = {iglesias:'#1a5276', templos:'#1a5276', sitios:'#1a5276', museos:'#1a5276', talleres:'#1e8449', trajes:'#1e8449', panaderias:'#d35400', fondas:'#d35400', fiestas:'#c70039', mitos:'#c70039'};
            if(nombre) {
                agregarPunto(latE, lngE, colores[cat] || '#555', nombre, 'https://via.placeholder.com/150', 'Lugar enviado a revisión', cat);
            }
        }

        function agregarPunto(lat, lng, color, titulo, img, texto, cat) {
            const icono = L.divIcon({ html: `<div style="background-color:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [16, 16] });
            if (grupos[cat]) {
                L.marker([lat, lng], {icon: icono}).addTo(grupos[cat]).bindPopup(`<div class="custom-card"><img src="${img}"><div class="card-body"><h3>${titulo}</h3><p>${texto}</p></div></div>`);
            }
        }

        agregarPunto(7.8357, -80.3964, '#c70039', 'Semana del Campesino en Agua Buena.', 'https://i.postimg.cc/vm2w86Ds/images-(1).jpg', 'Es una celebración donde nuestra comunidad se une para rendir homenaje a nuestras tradiciones, reflejando el orgullo por nuestra cultura a través de la vestimenta típica. Un momento muy especial es la presentación de la nueva reina, quien toma el lugar de la reina saliente para representar a nuestra comunidad durante todo el año. Es característico ver las carretas decoradas con elementos de nuestra identidad, como totumas, instrumentos musicales, bateas y churucas, mientras las empolleradas y la reina bailan al ritmo del tamborito. Además, compartimos una rica gastronomía con delicias como cocadas, cocaditas, rosquetes, yuca, chicharrones y chicha de junta. Esta fiesta es el espacio donde todo el pueblo se reúne para celebrar el legado que nos llena de orgullo y mantiene vivas nuestras costumbres.', 'fiestas');

        function filtrar() {
            document.querySelectorAll('.filtro').forEach(c => {
                const g = grupos[c.dataset.cat];
                if (g) { c.checked ? map.addLayer(g) : map.removeLayer(g); }
            });
        }
    </script>
</body>
</html>
